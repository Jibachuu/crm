name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          # 2026-07-01: миграция с Timeweb (72.56.243.123, был заблокирован
          # РКН из-за AWS/Supabase) на AEZA Amsterdam (45.94.37.151).
          # max-proxy/telegram-proxy теперь живут прямо на этом же VPS,
          # whisper-server пока не переехал — если приедет, обернуть
          # билд в systemctl stop/start как раньше.
          host: 45.94.37.151
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/crm-app
            git fetch origin main
            git reset --hard origin/main
            npm install
            # AEZA NLs-2 = 4 GB RAM, hoister 1.5 GB нам мало —
            # разгоняем до 3 GB (у нас есть запас: proxy-сервисы
            # едят ~120 MB, nginx ~10 MB, ФС cache остаётся).
            NODE_OPTIONS="--max-old-space-size=3072" npx next build
            # Двойная защита: рестартим только если билд реально на диске.
            test -f .next/BUILD_ID
            systemctl restart crm-app
            echo "Deploy complete!"
