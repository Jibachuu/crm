name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 72.56.243.123
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            # Без set -e bash продолжает на следующую строку при ошибке —
            # 15.05.2026 это привело к loop из 93 рестартов crm-app:
            # next build упал (OOM на 1024 MB heap), .next/BUILD_ID не
            # появился, а systemctl restart crm-app всё равно отработал
            # → сайт лёг с 502 Bad Gateway.
            cd /opt/crm-app
            git fetch origin main
            git reset --hard origin/main
            npm install
            # 22.05.2026 next build съел всю RAM (whisper-server 600 МБ +
            # crm-app + apt-daily) → OOM killer прибил whisper, BUILD_ID
            # не записался, сервер 2 дня сидел на старом билде. Останавливаем
            # whisper на время билда (он переживёт 3-минутный простой),
            # затем поднимаем обратно — даже если билд упадёт.
            WHISPER_RESTORED=0
            restore_whisper() { if [ "$WHISPER_RESTORED" = "0" ]; then WHISPER_RESTORED=1; systemctl start whisper-server || true; fi; }
            trap restore_whisper EXIT
            systemctl stop whisper-server || true
            NODE_OPTIONS="--max-old-space-size=1536" npx next build
            restore_whisper
            # Двойная защита: рестартим только если билд реально на диске.
            test -f .next/BUILD_ID
            systemctl restart crm-app
            echo "Deploy complete!"
